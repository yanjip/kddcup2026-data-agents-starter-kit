dataset:
  root_path: /input

agent:
  model: qwen3.5-35b-a3b
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: ""
  max_steps: 30
  temperature: 0.3
  max_main_steps: 28
  max_subagent_steps: 18
  max_subagents: 4
  enable_verification: false

run:
  output_dir: /output
  run_id: null
  max_workers: 8
  task_timeout_seconds: 600
